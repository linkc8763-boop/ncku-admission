<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>國立成功大學｜碩士班考試成績查詢系統</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="page-login">
  <div class="login-bg" aria-hidden="true"></div>
  <header class="topbar topbar--login">
    <div class="topbar__inner">
      <div class="brand">
        <div class="brand__mark" aria-hidden="true">
          <!-- Simple inline logo (replace later if you have official image) -->
          <svg viewBox="0 0 64 64" width="44" height="44" role="img" aria-label="NCKU">
            <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-width="4"/>
            <path d="M18 40V22h6l8 10V22h6v18h-6l-8-10v10h-6Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="brand__text">
          <div class="brand__title">國立成功大學</div>
          <div class="brand__sub">碩士班考試成績查詢系統</div>
        </div>
      </div>
    </div>
  </header>

  <main class="login-wrap">
    <section class="login-card" aria-label="登入">
      <h1 class="login-card__title">碩士班考試成績查詢系統</h1>
      <p class="login-card__hint">請輸入報名資料進行登入查詢。</p>

      <form id="loginForm" class="form">
        <label class="field">
          <span class="field__label">帳號</span>
          <input class="field__input" name="account" autocomplete="username" placeholder="身分證字號／護照號碼／報名序號" required />
        </label>

        <label class="field">
          <span class="field__label">密碼</span>
          <input class="field__input" type="password" name="password" autocomplete="current-password" placeholder="預設密碼為出生年月日(例：19990101)" required />
        </label>

        <div class="captcha">
          <label class="field captcha__input">
            <span class="field__label">驗證碼</span>
            <input class="field__input" name="captcha" inputmode="numeric" placeholder="請輸入右側驗證碼" required />
          </label>

          <button type="button" id="captchaBox" class="captcha__box" aria-label="重新產生驗證碼"></button>
        </div>

        <div class="actions">
          <button class="btn btn--primary" type="submit">登入</button>
          <button class="btn btn--ghost" type="button" id="forgotBtn">忘記密碼</button>
        </div>

        <div class="divider"><span>- OR -</span></div>

        <button class="btn btn--danger" type="button" id="firstBtn">首次登入／修改密碼</button>

        <p class="footnote">
          建議使用 Chrome、Edge 或 Firefox。<br/>
          本網站為「靜態示範版」：不連資料庫，僅示範介面與流程。
        </p>
      </form>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>

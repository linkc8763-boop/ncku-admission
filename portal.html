<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>國立成功大學｜查詢系統</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="page-portal">
  <header class="mobile-topbar">
    <div class="mobile-topbar__row">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="brand__mark" aria-hidden="true" style="color:white;">
          <svg viewBox="0 0 64 64" width="34" height="34">
            <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-width="4"/>
            <path d="M18 40V22h6l8 10V22h6v18h-6l-8-10v10h-6Z" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <div style="font-weight:900;letter-spacing:.02em;">國立成功大學</div>
          <div style="font-weight:800;opacity:.92;font-size:13px;">招生資訊系統</div>
        </div>
      </div>

      <button class="hamburger" id="menuBtn" aria-label="開啟選單">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path fill="currentColor" d="M3 6h18v2H3V6Zm0 5h18v2H3v-2Zm0 5h18v2H3v-2Z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="portal">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <div class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="36" height="36">
            <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-width="4"/>
            <path d="M18 40V22h6l8 10V22h6v18h-6l-8-10v10h-6Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="brand__text">
          <div class="brand__title">國立成功大學</div>
          <div class="brand__sub">招生資訊系統</div>
        </div>
      </div>

      <nav class="nav" aria-label="功能選單">
        <a class="active" href="./portal.html"><span class="nav__dot"></span>查詢首頁</a>
        <a href="#" onclick="alert('此為靜態示範版：未串接資料。'); return false;"><span class="nav__dot"></span>成績查詢</a>
        <a href="#" onclick="alert('此為靜態示範版：未串接資料。'); return false;"><span class="nav__dot"></span>注意事項</a>
      </nav>

      <div class="sidebar__footer">
        <button class="btn btn--danger" id="logoutBtn" type="button">登出</button>
      </div>
    </aside>

    <main class="main">
      <div class="main__inner">
        <h1 class="page-title">碩士班招生資訊系統（示範）</h1>

        <div class="tabs" role="tablist" aria-label="快捷">
          <div class="tab">系統公告</div>
          <div class="tab">查詢成績</div>
          <div class="tab">常見問題</div>
        </div>

        <section class="card notice">
          <h2>重要公告</h2>
          <ul>
            <li>本頁為介面示範：未連線成功大學資料庫，不會驗證真實帳密。</li>
            <li>登入後可在此查看「成績查詢」入口與公告資訊（示範）。</li>
            <li>若你之後要改成「真的可查詢」，再告訴我：我會協助規劃後端與資料格式。</li>
          </ul>
        </section>

        <section class="steps">
          <div class="steps__row">
            <div class="step">
              <div class="step__title">1｜登入</div>
              <div class="step__meta">輸入帳號、密碼與驗證碼</div>
            </div>
            <div class="step">
              <div class="step__title">2｜查詢</div>
              <div class="step__meta">進入成績查詢頁（示範）</div>
            </div>
            <div class="step">
              <div class="step__title">3｜列印</div>
              <div class="step__meta">下載 PDF（示範）</div>
            </div>
            <div class="step">
              <div class="step__title">4｜登出</div>
              <div class="step__meta">完成後登出系統</div>
            </div>
          </div>

          <section class="card" style="margin-top:4px;">
            <h2 style="margin:0 0 8px;font-size:16px;font-weight:900;">登入資訊</h2>
            <div style="color:rgba(0,0,0,.70);line-height:1.7;">
              目前登入帳號：<span id="who" style="font-weight:900;"></span>
            </div>
          </section>
        </section>

      </div>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
